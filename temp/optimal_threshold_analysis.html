<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>最適閾値分割の分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:#2e3350;
    --text:#e2e8f0;--muted:#8892a4;
    --blue:#60a5fa;--green:#34d399;--red:#f87171;
    --yellow:#fbbf24;--purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:13px/1.6 'Segoe UI',system-ui,sans-serif}
  h1{font-size:1.3rem;font-weight:700;padding:18px 22px 6px;color:#fff}
  h2{font-size:1rem;font-weight:600;color:var(--blue);margin-bottom:10px}
  h3{font-size:0.82rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .sub{color:var(--muted);font-size:0.82rem;padding:0 22px 14px}
  .tab-bar{display:flex;gap:3px;padding:0 22px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .tab{padding:7px 13px;cursor:pointer;font-size:0.78rem;color:var(--muted);border-radius:6px 6px 0 0;border:1px solid transparent;border-bottom:none;transition:all .15s}
  .tab:hover{color:var(--text);background:var(--bg2)}
  .tab.active{color:var(--blue);background:var(--bg2);border-color:var(--border)}
  .panel{display:none;padding:18px 22px}
  .panel.active{display:block}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
  .cw{position:relative;height:230px}
  .cw-sm{position:relative;height:180px}
  .cw-lg{position:relative;height:280px}
  .pt{width:100%;border-collapse:collapse;font-size:0.78rem}
  .pt th{background:var(--bg3);color:var(--muted);text-align:left;padding:5px 8px;font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
  .pt td{padding:5px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
  .pt tr:last-child td{border-bottom:none}
  .pt td:first-child{font-family:monospace;font-size:0.75rem;color:var(--cyan)}
  .good{color:var(--green);font-weight:600}
  .bad{color:var(--red);font-weight:600}
  .neu{color:var(--yellow)}
  .lru-row td{color:var(--muted);font-style:italic}
  .best-mr td:nth-child(3){background:#1a3a2a;border-radius:3px}
  .best-bmr td:nth-child(4){background:#1a2a3a;border-radius:3px}
  .pareto-row{background:#1a2a1a}
  .badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:0.7rem;font-weight:600;margin-left:4px}
  .b-green{background:#0d2a1a;color:var(--green)}
  .b-red{background:#2a0d0d;color:var(--red)}
  .b-blue{background:#0d1a2a;color:var(--blue)}
  .b-yellow{background:#2a1d0d;color:var(--yellow)}
  .insight{background:var(--bg3);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:10px 14px;margin-top:12px;font-size:0.82rem;line-height:1.8}
  .insight.g{border-color:var(--green)}
  .insight.r{border-color:var(--red)}
  .insight.y{border-color:var(--yellow)}
  .sr{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .st{background:var(--bg3);border-radius:8px;padding:8px 12px;flex:1;min-width:100px}
  .sl{font-size:0.7rem;color:var(--muted);text-transform:uppercase}
  .sv{font-size:1.2rem;font-weight:700;color:var(--blue)}
  .note{font-size:0.78rem;color:var(--muted);margin-top:6px}
  @media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>

// Build overview tab
function buildOv(){
  const d=document.createElement('div');
  d.className='panel active';d.id='panel-ov';
  
  // Summary table
  let h='<h2>全トレース・全キャッシュサイズ：最良Pareto設定（ΔMR+ΔBMR最小）</h2>';
  h+='<div class="card" style="overflow-x:auto"><table class="pt"><tr>';
  h+='<th>トレース</th>';
  for(const p of['10%','30%','50%']){
    h+=`<th colspan="3" style="text-align:center;border-left:1px solid var(--border)">${p}キャッシュ</th>`;
  }
  h+='</tr><tr><th></th>';
  for(let i=0;i<3;i++) h+='<th style="border-left:1px solid var(--border)">Pareto閾値</th><th>ΔMR</th><th>ΔBMR</th>';
  h+='</tr>';
  
  for(const tc of TRACES){
    h+=`<tr><td style="color:var(--text);font-family:normal;font-size:0.78rem">${TL[tc]}</td>`;
    for(const pct of['10','30','50']){
      const d2=FULL[tc][pct];
      const nonLru=d2.rows.filter(r=>r.label!=='LRU');
      // Best combined
      const sorted=[...nonLru].sort((a,b)=>(a.delta_mr+a.delta_bmr)-(b.delta_mr+b.delta_bmr));
      const best=sorted[0];
      // Check if Pareto exists
      const pareto=nonLru.filter(r=>r.delta_mr<=0&&r.delta_bmr<=0);
      const bestP=pareto.length>0?[...pareto].sort((a,b)=>(a.delta_mr+a.delta_bmr)-(b.delta_mr+b.delta_bmr))[0]:null;
      
      const disp=bestP||best;
      const isPareto=bestP!==null;
      const shortThr=disp.threshold.replace(/kiB/g,'K').replace(/MiB/g,'M').replace(/GiB/g,'G');
      
      h+=`<td style="border-left:1px solid var(--border);font-family:monospace;font-size:0.72rem;color:${isPareto?'var(--cyan)':'var(--yellow)'}">
        ${shortThr}${isPareto?'<span class="badge b-green">Pareto</span>':''}
      </td>`;
      h+=`<td class="${dc(disp.delta_mr)}">${fp(disp.delta_mr)}</td>`;
      h+=`<td class="${dc(disp.delta_bmr)}">${fp(disp.delta_bmr)}</td>`;
    }
    h+='</tr>';
  }
  h+='</table></div>';
  
  // ΔMR bar chart overview
  h+=`<div class="grid2" style="margin-top:16px">
    <div class="card"><h3>最良ΔMR (対LRU)</h3><div class="cw"><canvas id="ov-mr"></canvas></div></div>
    <div class="card"><h3>最良ΔBMR (対LRU)</h3><div class="cw"><canvas id="ov-bmr"></canvas></div></div>
  </div>`;
  
  h+=`<div class="insight y" style="margin-top:14px">
    <strong>主要知見：</strong>
    閾値選択の鍵は「OHWが急上昇するサイズ境界」に閾値を置くこと。
    <strong>cldphyBlk</strong>では単一閾値256KiBが7分割と性能差0.02pt以内。
    <strong>tncntBlk（30%+）</strong>は7分割16KiB〜64MiBが有効。
    <strong>metaCDN・wikiCDN</strong>はMR改善とBMR改善がトレードオフで、Pareto達成不可。
    <strong>twiKV・metaBlk</strong>はいかなる分割でも改善なし。
  </div>`;
  
  d.innerHTML=h;
  return d;
}

// Build per-trace panel
function buildTrace(tc){
  const d=document.createElement('div');
  d.className='panel';d.id=`panel-${tc}`;
  
  let h=`<h2>${TL[tc]}</h2>`;
  
  // Stat row with summary
  const p10=FULL[tc]['10'],p30=FULL[tc]['30'],p50=FULL[tc]['50'];
  const best10=getBest(p10);const best30=getBest(p30);const best50=getBest(p50);
  
  h+=`<div class="sr">
    <div class="st"><div class="sl">10%キャッシュ 最良設定</div>
      <div class="sv" style="font-size:0.85rem;font-family:monospace">${best10.label}</div>
      <div class="note">ΔMR <span class="${dc(best10.delta_mr)}">${fp(best10.delta_mr)}</span>  ΔBMR <span class="${dc(best10.delta_bmr)}">${fp(best10.delta_bmr)}</span></div>
    </div>
    <div class="st"><div class="sl">30%キャッシュ 最良設定</div>
      <div class="sv" style="font-size:0.85rem;font-family:monospace">${best30.label}</div>
      <div class="note">ΔMR <span class="${dc(best30.delta_mr)}">${fp(best30.delta_mr)}</span>  ΔBMR <span class="${dc(best30.delta_bmr)}">${fp(best30.delta_bmr)}</span></div>
    </div>
    <div class="st"><div class="sl">50%キャッシュ 最良設定</div>
      <div class="sv" style="font-size:0.85rem;font-family:monospace">${best50.label}</div>
      <div class="note">ΔMR <span class="${dc(best50.delta_mr)}">${fp(best50.delta_mr)}</span>  ΔBMR <span class="${dc(best50.delta_bmr)}">${fp(best50.delta_bmr)}</span></div>
    </div>
  </div>`;
  
  // Scatter charts: all configs in (ΔMR, ΔBMR) space
  h+=`<div class="grid3">`;
  for(const pct of['10','30','50']){
    h+=`<div class="card">
      <h3>${pct}%キャッシュ：設定空間 (ΔMR vs ΔBMR)</h3>
      <div class="cw-sm"><canvas id="${tc}-scatter-${pct}"></canvas></div>
      <div class="note" style="margin-top:4px">左下=両指標改善（Pareto領域）、●=全設定 ★=LRU基準</div>
    </div>`;
  }
  h+=`</div>`;
  
  // Full ranking table for each cache size
  h+=`<div class="grid3" style="margin-top:14px">`;
  for(const pct of['10','30','50']){
    const pd=FULL[tc][pct];
    const sorted=[...pd.rows].sort((a,b)=>(a.delta_mr+a.delta_bmr)-(b.delta_mr+b.delta_bmr));
    const bestMrVal=Math.min(...pd.rows.filter(r=>r.label!=='LRU').map(r=>r.mr));
    const bestBmrVal=Math.min(...pd.rows.filter(r=>r.label!=='LRU').map(r=>r.bmr));
    
    h+=`<div class="card" style="overflow-x:auto">
      <h3>${pct}%キャッシュ 全設定ランキング (ΔMR+ΔBMR順)</h3>
      <table class="pt">
        <tr><th>#</th><th>設定</th><th>ΔMR</th><th>ΔBMR</th><th>合計</th></tr>`;
    
    sorted.forEach((r,i)=>{
      const isLru=r.label==='LRU';
      const isPareto=r.delta_mr<=0&&r.delta_bmr<=0&&!isLru;
      const isBestMr=!isLru&&r.mr===bestMrVal;
      const isBestBmr=!isLru&&r.bmr===bestBmrVal;
      const rowClass=isLru?'lru-row':isPareto?'pareto-row':'';
      const shortThr=r.threshold.replace(/kiB/g,'K').replace(/MiB/g,'M');
      const badges=(isBestMr?'<span class="badge b-green">MR最良</span>':'')+(isBestBmr?'<span class="badge b-blue">BMR最良</span>':'')+(isPareto?'<span class="badge b-green">Pareto</span>':'');
      h+=`<tr class="${rowClass}">
        <td style="color:var(--muted);font-family:normal">${isLru?'-':i+1}</td>
        <td>${isLru?'<span style="color:var(--muted)">LRU (基準)</span>':`<span style="color:var(--cyan)">${r.label}</span>${badges}`}</td>
        <td class="${isLru?'':''+dc(r.delta_mr)}">${isLru?fr(r.mr):fp(r.delta_mr)}</td>
        <td class="${isLru?'':''+dc(r.delta_bmr)}">${isLru?fr(r.bmr):fp(r.delta_bmr)}</td>
        <td class="${isLru?'':''+dc(r.delta_mr+r.delta_bmr)}">${isLru?'-':fp(r.delta_mr+r.delta_bmr)}</td>
      </tr>`;
    });
    h+='</table></div>';
  }
  h+='</div>';
  
  d.innerHTML=h;
  return d;
}

function getBest(pd){
  const nonLru=pd.rows.filter(r=>r.label!=='LRU');
  const pareto=nonLru.filter(r=>r.delta_mr<=0&&r.delta_bmr<=0);
  if(pareto.length>0) return [...pareto].sort((a,b)=>(a.delta_mr+a.delta_bmr)-(b.delta_mr+b.delta_bmr))[0];
  return [...nonLru].sort((a,b)=>(a.delta_mr+a.delta_bmr)-(b.delta_mr+b.delta_bmr))[0];
}

// Init
const tb=document.getElementById('tb');
const panels=document.getElementById('panels');

const ovTab=document.createElement('div');
ovTab.className='tab active';ovTab.textContent='全体サマリー';ovTab.dataset.p='ov';
tb.appendChild(ovTab);panels.appendChild(buildOv());

for(const tc of TRACES){
  const tab=document.createElement('div');
  tab.className='tab';tab.textContent=TL[tc].replace(' Block','').replace(' CDN','').replace(' KV','');
  tab.dataset.p=tc;tb.appendChild(tab);panels.appendChild(buildTrace(tc));
}

tb.addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById(`panel-${t.dataset.p}`).classList.add('active');
  renderChartsForPanel(t.dataset.p);
});

// Chart rendering
const rendered=new Set();
function renderChartsForPanel(p){
  if(rendered.has(p))return;rendered.add(p);
  if(p==='ov'){renderOvCharts();return;}
  renderTraceCharts(p);
}

function renderOvCharts(){
  const shortLabels=TRACES.map(t=>TL[t].split(' ')[0]);
  
  ['mr','bmr'].forEach(metric=>{
    const ctx=document.getElementById(`ov-${metric}`);
    if(!ctx)return;
    new Chart(ctx,{
      type:'bar',
      data:{
        labels:shortLabels,
        datasets:[
          {label:'10%',data:TRACES.map(t=>{const d=FULL[t]['10'];const nr=d.rows.filter(r=>r.label!=='LRU');return Math.min(...nr.map(r=>r['delta_'+metric]));}),backgroundColor:'#3b82f680',borderColor:'#60a5fa',borderWidth:1},
          {label:'30%',data:TRACES.map(t=>{const d=FULL[t]['30'];const nr=d.rows.filter(r=>r.label!=='LRU');return Math.min(...nr.map(r=>r['delta_'+metric]));}),backgroundColor:'#10b98180',borderColor:'#34d399',borderWidth:1},
          {label:'50%',data:TRACES.map(t=>{const d=FULL[t]['50'];const nr=d.rows.filter(r=>r.label!=='LRU');return Math.min(...nr.map(r=>r['delta_'+metric]));}),backgroundColor:'#f59e0b80',borderColor:'#fbbf24',borderWidth:1},
        ]
      },
      options:{...CO,plugins:{legend:{display:true,position:'bottom',labels:{color:'#8892a4',font:{size:9},boxWidth:10,padding:6}}},scales:{...CO.scales,y:{...CO.scales.y,title:{display:true,text:'Δ '+metric.toUpperCase()+' (pt)',color:'#8892a4'}}}}
    });
  });
}

function renderTraceCharts(tc){
  const COLORS=['#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c','#22d3ee','#f472b6','#4ade80','#818cf8'];
  
  for(const pct of['10','30','50']){
    const pd=FULL[tc][pct];
    const ctx=document.getElementById(`${tc}-scatter-${pct}`);
    if(!ctx)continue;
    
    const points=pd.rows.filter(r=>r.label!=='LRU').map((r,i)=>({x:r.delta_mr,y:r.delta_bmr,label:r.label,thr:r.threshold}));
    const paretoPoints=points.filter(p=>p.x<=0&&p.y<=0);
    const otherPoints=points.filter(p=>!(p.x<=0&&p.y<=0));
    
    new Chart(ctx,{
      type:'scatter',
      data:{
        datasets:[
          {label:'通常設定',data:otherPoints.map(p=>({x:p.x,y:p.y,label:p.label})),backgroundColor:'#60a5fa60',borderColor:'#60a5fa',pointRadius:4,pointHoverRadius:6},
          {label:'Pareto設定',data:paretoPoints.map(p=>({x:p.x,y:p.y,label:p.label})),backgroundColor:'#34d39980',borderColor:'#34d399',pointRadius:5,pointHoverRadius:7,pointStyle:'star'},
          {label:'LRU基準',data:[{x:0,y:0}],backgroundColor:'#f87171',borderColor:'#f87171',pointRadius:6,pointStyle:'crossRot'},
        ]
      },
      options:{
        ...CO,
        plugins:{
          legend:{display:true,position:'bottom',labels:{color:'#8892a4',font:{size:9},boxWidth:10,padding:5}},
          tooltip:{callbacks:{label:c=>{const d=c.raw;return `${d.label||''}: ΔMR=${d.x>=0?'+':''}${(d.x||0).toFixed(2)} ΔBMR=${d.y>=0?'+':''}${(d.y||0).toFixed(2)}`}}}
        },
        scales:{
          x:{...CO.scales.x,title:{display:true,text:'ΔMR (pt)',color:'#8892a4',font:{size:10}}},
          y:{...CO.scales.y,title:{display:true,text:'ΔBMR (pt)',color:'#8892a4',font:{size:10}}}
        }
      }
    });
  }
}

// Render overview on load
setTimeout(()=>{renderChartsForPanel('ov');},100);
</script>
