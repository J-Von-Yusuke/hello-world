<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OHW分布分析 — 全トレース比較</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
:root {
  --bg:#0f1117; --bg2:#181c28; --bg3:#1e2335; --border:#2a3050;
  --text:#d4d8f0; --muted:#6b7399;
  --blue:#4f8ef7; --orange:#f97316; --green:#22c55e;
  --red:#ef4444; --yellow:#facc15; --purple:#a78bfa;
  --vdip:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}

.header{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;gap:24px}
.header h1{font-size:18px;font-weight:700}
.header .sub{color:var(--muted);font-size:12px;margin-top:3px}
.legend-row{display:flex;gap:16px;align-items:center;margin-left:auto}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:12px;height:12px;border-radius:2px}

.layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 60px)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:12px 10px;display:flex;flex-direction:column;gap:6px}
.sidebar h2{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:4px 6px 8px}
.trace-btn{
  padding:8px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);cursor:pointer;transition:all .12s;text-align:left;
}
.trace-btn:hover{border-color:var(--blue);background:#1a2038}
.trace-btn.active{border-color:var(--blue);background:#1a2a44}
.trace-btn .tname{font-size:12px;font-weight:600}
.trace-btn .tmeta{font-size:10px;color:var(--muted);margin-top:2px}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:3px}
.badge-vdip{background:var(--vdip);color:#000}
.badge-none{background:#2a3050;color:var(--muted)}

.main{padding:20px 24px;display:flex;flex-direction:column;gap:20px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.card-title{font-size:14px;font-weight:700}
.card-sub{font-size:11px;color:var(--muted)}
.vdip-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;
  border:1px solid var(--vdip);color:var(--vdip);background:rgba(249,115,22,.08);
  margin-left:auto;
}

.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
.chart-wrap canvas{width:100%!important}
.chart-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}

.insight{
  margin:0 16px 16px;padding:10px 14px;border-radius:7px;font-size:12px;line-height:1.6;
  border-left:3px solid;
}
.insight-vdip{background:rgba(249,115,22,.07);border-color:var(--vdip)}
.insight-none{background:rgba(107,115,153,.07);border-color:var(--border)}
.insight strong{font-weight:700}
.mono{font-family:monospace;font-size:11px}

.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.stat-val{font-size:18px;font-weight:700;color:var(--blue)}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>

<div class="header">

    <h1>OHW分布分析 — 全トレース</h1>

    <div class="leg"><div class="leg-dot" style="background:var(--red);height:3px;border-radius:2px"></div>OHW率 r</div>
    <div class="leg"><div class="leg-dot" style="background:var(--vdip);width:3px;height:12px;border-radius:1px"></div>V字谷検出</div>
  </div>
</div>

<div class="layout">
<div class="sidebar">

</div>
<div class="main" id="mainArea"></div>
</div>

let charts = {};
let current = 'metaCDN';

function buildSidebar() {
  const el = document.getElementById('traceList');
  const order = ['metaCDN','metaKV','msrBlk','metaBlk','cldphyBlk','tncntBlk','wikiCDN','tncntCDN','twiKV'];
  order.forEach(name => {
    if (!TRACES[name]) return;
    const t = TRACES[name];
    const hasVdip = t.vdips.length > 0;
    const btn = document.createElement('div');
    btn.className = 'trace-btn' + (name === current ? ' active' : '');
    btn.dataset.name = name;
    const badge = hasVdip
      ? `<span class="badge badge-vdip">V字谷</span>`
      : `<span class="badge badge-none">なし</span>`;
    btn.innerHTML = `<div class="tname">${badge}${name}</div><div class="tmeta">${t.bins.length}ビン</div>`;
    btn.addEventListener('click', () => select(name));
    el.appendChild(btn);
  });
}

function select(name) {
  current = name;
  document.querySelectorAll('.trace-btn').forEach(b => b.classList.toggle('active', b.dataset.name === name));
  render();
}

function render() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const t = TRACES[current];
  const info = VDIP_INFO[current];
  const labels = t.bins.map(b => b.label);
  const vdipBins = t.vdips;

  const vdipLabel = vdipBins.length
    ? vdipBins.map(b => { const bd = t.bins.find(x=>x.bin===b); return bd ? bd.label : `bin${b}`; }).join(', ')

  const main = document.getElementById('mainArea');

           ticks:{color:'#ef8888',font:{size:10},callback:v=>v+'%'},
           grid:{color:'#1e2335'},
           title:{display:true,text:'OHW率 r (%)',color:'#ef8888',font:{size:10}}},
        y2:{position:'right',type:rhoScale,
            ticks:{color:'#a78bfa',font:{size:10}},
            grid:{drawOnChartArea:false},
            title:{display:true,text:'rho (再利用回数)',color:'#a78bfa',font:{size:10}}}
      },
      plugins:{
        legend:{labels:{color:'#d4d8f0',font:{size:11},boxWidth:10}},
        annotation:{annotations:{
          ...annOhw,
          r75:{type:'line',scaleID:'y',value:75,borderColor:'rgba(239,68,68,0.3)',
               borderWidth:1,borderDash:[3,3],
               label:{display:true,content:'r=75%',position:'end',color:'#ef4444',
                      backgroundColor:'transparent',font:{size:9}}},
        }}
      }
    }
  });
}

buildSidebar();
render();
</script>
