<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
    --border: #2e3350; --text: #e2e8f0; --muted: #8892a4;
    --blue: #60a5fa; --green: #34d399; --red: #f87171;
    --yellow: #fbbf24; --purple: #a78bfa; --orange: #fb923c;
    --cyan: #22d3ee; --pink: #f472b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.6 'Segoe UI', system-ui, sans-serif; }
  h1 { font-size: 1.4rem; font-weight: 700; padding: 20px 24px 8px; color: #fff; }
  h2 { font-size: 1.05rem; font-weight: 600; color: var(--blue); margin-bottom: 12px; }
  h3 { font-size: 0.9rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; padding: 0 24px 16px; }
  
  .tab-bar { display: flex; gap: 4px; padding: 0 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tab { padding: 8px 14px; cursor: pointer; font-size: 0.8rem; color: var(--muted); border-radius: 6px 6px 0 0; border: 1px solid transparent; border-bottom: none; transition: all .15s; }
  .tab:hover { color: var(--text); background: var(--bg2); }
  .tab.active { color: var(--blue); background: var(--bg2); border-color: var(--border); }
  
  .panel { display: none; padding: 20px 24px; }
  .panel.active { display: block; }
  
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .chart-wrap { position: relative; height: 240px; }
  .chart-wrap-tall { position: relative; height: 300px; }
  
  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { background: var(--bg3); border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 110px; }
  .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val { font-size: 1.3rem; font-weight: 700; }
  .val-good { color: var(--green); }
  .val-bad { color: var(--red); }
  .val-neutral { color: var(--yellow); }
  .val-blue { color: var(--blue); }
  
  .perf-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .perf-table th { background: var(--bg3); color: var(--muted); text-align: center; padding: 6px 10px; font-weight: 500; border-bottom: 1px solid var(--border); }
  .perf-table td { padding: 6px 10px; text-align: center; border-bottom: 1px solid var(--border); }
  .perf-table tr:last-child td { border-bottom: none; }
  .good { color: var(--green); font-weight: 600; }
  .bad { color: var(--red); font-weight: 600; }
  .neutral { color: var(--yellow); }
  
  .overview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media(max-width: 900px) { .grid2, .grid3, .overview-grid { grid-template-columns: 1fr; } }
  
  .legend-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; font-size: 0.78rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-line { width: 18px; height: 3px; border-radius: 2px; }
  
  .insight { background: var(--bg3); border-left: 3px solid var(--blue); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-top: 12px; font-size: 0.83rem; line-height: 1.7; }
  .insight.green { border-color: var(--green); }
  .insight.red { border-color: var(--red); }
  .insight.yellow { border-color: var(--yellow); }
  
  .trace-type { font-size: 0.72rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .type-blk { background: #1e3a5f; color: var(--blue); }
  .type-kv { background: #1a3a2a; color: var(--green); }
  .type-cdn { background: #3a2a1a; color: var(--orange); }
</style>
</head>

const TRACES = ['metaKV','twiKV','metaCDN','tncntCDN','wikiCDN','metaBlk','tncntBlk','cldphyBlk','mrsBlk'];
const TRACE_LABELS = {
  metaKV: 'Meta KV', twiKV: 'Twitter KV',
  metaCDN: 'Meta CDN', tncntCDN: 'Tencent CDN', wikiCDN: 'Wikipedia CDN',
  metaBlk: 'Meta Block', tncntBlk: 'Tencent Block', cldphyBlk: 'CloudPhysics Block', mrsBlk: 'MSR Block'
};
const TRACE_TYPE = {
  metaKV:'kv', twiKV:'kv', metaCDN:'cdn', tncntCDN:'cdn', wikiCDN:'cdn',
  metaBlk:'blk', tncntBlk:'blk', cldphyBlk:'blk', mrsBlk:'blk'
};
const TYPE_CLASS = {kv:'type-kv', cdn:'type-cdn', blk:'type-blk'};

const chartInstances = {};

function deltaClass(v) {
  if (v < -0.5) return 'good';
  if (v > 0.3) return 'bad';
  return 'neutral';
}
function fmt1(v) { return v.toFixed(2); }
function fmtDelta(v) { return (v >= 0 ? '+' : '') + v.toFixed(2); }

// Build overview tab
function buildOverview() {
  const div = document.createElement('div');
  div.className = 'panel active';
  div.id = 'panel-overview';

  let html = '<h2>全トレース サマリー</h2>';
  html += '<div class="overview-grid">';
  
  for (const tc of TRACES) {
    const d = DATA[tc];
    const g = d.global;
    const p10 = d.perf['10'], p30 = d.perf['30'], p50 = d.perf['50'];
    const type = TRACE_TYPE[tc];
    
    // Classify OHW pattern
    const bins = d.bins;
    const largeBins = bins.filter(b => b.mean_size > 100000);
    const smallBins = bins.filter(b => b.mean_size < 10000 && b.mean_size > 0);
    const avgLargeOhw = largeBins.length ? largeBins.reduce((s,b)=>s+b.r,0)/largeBins.length : null;
    const avgSmallOhw = smallBins.length ? smallBins.reduce((s,b)=>s+b.r,0)/smallBins.length : null;
    let ohwPattern = '均一';
    if (avgLargeOhw !== null && avgSmallOhw !== null) {
      if (avgLargeOhw > avgSmallOhw + 0.15) ohwPattern = '大サイズ↑';
      else if (avgLargeOhw < avgSmallOhw - 0.15) ohwPattern = '大サイズ↓';
    }
    
    const mr10c = deltaClass(p10.best_delta_mr);
    const bmr10c = deltaClass(p10.best_delta_bmr);
    
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <strong style="font-size:1rem">${TRACE_LABELS[tc]}</strong>
        <span class="trace-type ${TYPE_CLASS[type]}">${type.toUpperCase()}</span>
      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-label">OHW率</div><div class="stat-val val-blue">${(g.ohw_rate*100).toFixed(1)}%</div></div>
        <div class="stat"><div class="stat-label">Zipf α</div><div class="stat-val val-blue">${g.zipf_alpha.toFixed(3)}</div></div>
        <div class="stat"><div class="stat-label">OHW傾向</div><div class="stat-val" style="font-size:1rem">${ohwPattern}</div></div>
      </div>
      <table class="perf-table">
        <tr><th>Cache%</th><th>LRU MR</th><th>ΔMR(best)</th><th>LRU BMR</th><th>ΔBMR(best)</th></tr>
        <tr>
          <td>10%</td><td>${fmt1(p10.lru_mr)}%</td>
          <td class="${deltaClass(p10.best_delta_mr)}">${fmtDelta(p10.best_delta_mr)}pt</td>
          <td>${fmt1(p10.lru_bmr)}%</td>
          <td class="${deltaClass(p10.best_delta_bmr)}">${fmtDelta(p10.best_delta_bmr)}pt</td>
        </tr>
        <tr>
          <td>30%</td><td>${fmt1(p30.lru_mr)}%</td>
          <td class="${deltaClass(p30.best_delta_mr)}">${fmtDelta(p30.best_delta_mr)}pt</td>
          <td>${fmt1(p30.lru_bmr)}%</td>
          <td class="${deltaClass(p30.best_delta_bmr)}">${fmtDelta(p30.best_delta_bmr)}pt</td>
        </tr>
        <tr>
          <td>50%</td><td>${fmt1(p50.lru_mr)}%</td>
          <td class="${deltaClass(p50.best_delta_mr)}">${fmtDelta(p50.best_delta_mr)}pt</td>
          <td>${fmt1(p50.lru_bmr)}%</td>
          <td class="${deltaClass(p50.best_delta_bmr)}">${fmtDelta(p50.best_delta_bmr)}pt</td>
        </tr>
      </table>
    </div>`;
  }
  html += '</div>';

  // Overview chart: delta MR and BMR bar chart
  html += `<div class="grid2" style="margin-top:20px">
    <div class="card">
      <h3>MR改善量 (ΔMR = best - LRU, 負が改善)</h3>
      <div class="chart-wrap-tall"><canvas id="ov-mr-chart"></canvas></div>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-line" style="background:#60a5fa"></div>10%キャッシュ</div>
        <div class="legend-item"><div class="legend-line" style="background:#34d399"></div>30%キャッシュ</div>
        <div class="legend-item"><div class="legend-line" style="background:#fbbf24"></div>50%キャッシュ</div>
      </div>
    </div>
    <div class="card">
      <h3>BMR改善量 (ΔBMR = best - LRU, 負が改善)</h3>
      <div class="chart-wrap-tall"><canvas id="ov-bmr-chart"></canvas></div>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-line" style="background:#60a5fa"></div>10%キャッシュ</div>
        <div class="legend-item"><div class="legend-line" style="background:#34d399"></div>30%キャッシュ</div>
        <div class="legend-item"><div class="legend-line" style="background:#fbbf24"></div>50%キャッシュ</div>
      </div>
    </div>
  </div>`;

  div.innerHTML = html;
  return div;
}

      <h3>${pct}%キャッシュ: 閾値スイープ</h3>
      <div class="chart-wrap"><canvas id="${tc}-sweep-${pct}"></canvas></div>
      <div style="margin-top:8px;font-size:0.78rem;color:var(--muted)">
        LRU MR: <strong style="color:var(--text)">${fmt1(p.lru_mr)}%</strong>
        LRU BMR: <strong style="color:var(--text)">${fmt1(p.lru_bmr)}%</strong>
      </div>
    </div>`;
  }
  html += '</div>';
  
  // Insight
  const mr10 = d.perf['10'].best_delta_mr;
  const bmr10 = d.perf['10'].best_delta_bmr;
  const mr30 = d.perf['30'].best_delta_mr;
  const bmr30 = d.perf['30'].best_delta_bmr;
  const bmr50 = d.perf['50'].best_delta_bmr;
  let insightClass = 'blue';
  let insightText = '';
  
  if (mr10 < -1 && bmr10 < 0) {
    insightClass = 'green';
    insightText = `MR・BMRともに改善。10%キャッシュでΔMR=${fmtDelta(mr10)}pt、ΔBMR=${fmtDelta(bmr10)}pt。`;
  } else if (mr10 < -1 && bmr10 > 0.5) {
    insightClass = 'yellow';
    insightText = `MR改善（ΔMR=${fmtDelta(mr10)}pt）だがBMRは悪化（ΔBMR=${fmtDelta(bmr10)}pt）。`;
  } else if (Math.abs(mr10) < 0.3 && Math.abs(bmr10) < 0.3) {
    insightClass = 'blue';
    insightText = `RegionSplitの効果はほぼ中立。MR変化=${fmtDelta(mr10)}pt、BMR変化=${fmtDelta(bmr10)}pt。`;
  } else if (bmr50 < -2) {
    insightClass = 'green';
    insightText = `50%キャッシュでBMR大幅改善（ΔBMR=${fmtDelta(bmr50)}pt）。キャッシュサイズ増加で効果が顕在化。`;
  } else {
    insightClass = 'blue';
    insightText = `MR: ${fmtDelta(mr10)}→${fmtDelta(mr30)}pt (10→30%). BMR: ${fmtDelta(bmr10)}→${fmtDelta(bmr30)}pt (10→30%).`;
  }
  
  html += `<div class="insight ${insightClass}" style="margin-top:16px">📊 ${insightText}</div>`;
  
  div.innerHTML = html;
  return div;
}

function fmtSize(b) {
  if (b >= 2**30) return (b/2**30).toFixed(1)+'GiB';
  if (b >= 2**20) return (b/2**20).toFixed(1)+'MiB';
  if (b >= 2**10) return (b/2**10).toFixed(1)+'KiB';
  return b.toFixed(0)+'B';
}

function initCharts() {
  const defaults = {
    color: '#8892a4',
    borderColor: '#2e3350',
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#8892a4', font: { size: 10 } }, grid: { color: '#1e2338' } },
      y: { ticks: { color: '#8892a4', font: { size: 10 } }, grid: { color: '#1e2338' } }
    }
  };
  
  // Overview MR chart
  const ovMrCtx = document.getElementById('ov-mr-chart');
  if (ovMrCtx) {
    new Chart(ovMrCtx, {
      type: 'bar',
      data: {
        labels: TRACES.map(t => TRACE_LABELS[t].replace(' Block','').replace(' CDN','').replace(' KV','')),
        datasets: [
          { label: '10%', data: TRACES.map(t=>DATA[t].perf['10'].best_delta_mr), backgroundColor: '#3b82f680', borderColor: '#60a5fa', borderWidth: 1 },
          { label: '30%', data: TRACES.map(t=>DATA[t].perf['30'].best_delta_mr), backgroundColor: '#10b98180', borderColor: '#34d399', borderWidth: 1 },
          { label: '50%', data: TRACES.map(t=>DATA[t].perf['50'].best_delta_mr), backgroundColor: '#f59e0b80', borderColor: '#fbbf24', borderWidth: 1 },
        ]
      },
      options: { ...defaults, scales: { ...defaults.scales, y: { ...defaults.scales.y, title: { display: true, text: 'Δ MR (pt)', color: '#8892a4' } } } }
    });
  }
  
  const ovBmrCtx = document.getElementById('ov-bmr-chart');
  if (ovBmrCtx) {
    new Chart(ovBmrCtx, {
      type: 'bar',
      data: {
        labels: TRACES.map(t => TRACE_LABELS[t].replace(' Block','').replace(' CDN','').replace(' KV','')),
        datasets: [
          { label: '10%', data: TRACES.map(t=>DATA[t].perf['10'].best_delta_bmr), backgroundColor: '#3b82f680', borderColor: '#60a5fa', borderWidth: 1 },
          { label: '30%', data: TRACES.map(t=>DATA[t].perf['30'].best_delta_bmr), backgroundColor: '#10b98180', borderColor: '#34d399', borderWidth: 1 },
          { label: '50%', data: TRACES.map(t=>DATA[t].perf['50'].best_delta_bmr), backgroundColor: '#f59e0b80', borderColor: '#fbbf24', borderWidth: 1 },
        ]
      },
      options: { ...defaults, scales: { ...defaults.scales, y: { ...defaults.scales.y, title: { display: true, text: 'Δ BMR (pt)', color: '#8892a4' } } } }
    });
  }
  
  // Per-trace charts
  for (const tc of TRACES) {
    const d = DATA[tc];
    const bins = d.bins;
    const labels = bins.map(b => b.label);
    
    // Distribution chart
    const distCtx = document.getElementById(`${tc}-dist`);
    if (distCtx) {
      new Chart(distCtx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'リクエスト割合(q%)', data: bins.map(b=>b.q), backgroundColor: '#3b82f660', borderColor: '#60a5fa', borderWidth: 1 },
            { label: 'バイト量割合', data: bins.map(b=>b.byte_share), backgroundColor: '#f97316' + '60', borderColor: '#fb923c', borderWidth: 1 },
          ]
        },
        options: { ...defaults, scales: { ...defaults.scales, y: { ...defaults.scales.y, title: { display: true, text: '割合 (%)', color: '#8892a4' } } } }
      });
    }
    
    // OHW + rho chart
    const ohwCtx = document.getElementById(`${tc}-ohw`);
    if (ohwCtx) {
      new Chart(ohwCtx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'OHW率(r)', data: bins.map(b=>b.r), backgroundColor: '#ef444440', borderColor: '#f87171', borderWidth: 1, yAxisID: 'y' },
            { label: 'log₂(ρ)', data: bins.map(b=>b.rho>0?Math.log2(b.rho):0), type: 'line', borderColor: '#a78bfa', borderWidth: 2, pointRadius: 3, fill: false, tension: 0.3, yAxisID: 'y2' },
          ]
        },
        options: {
          ...defaults,
          scales: {
            x: defaults.scales.x,
            y: { ...defaults.scales.y, min: 0, max: 1, title: { display: true, text: 'OHW率', color: '#f87171', font:{size:10} } },
            y2: { position: 'right', min: 0, ticks: { color: '#a78bfa', font:{size:10} }, grid: { display: false }, title: { display: true, text: 'log₂(ρ)', color: '#a78bfa', font:{size:10} } }
          }
        }
      });
    }
    
    // Sweep charts
    for (const pct of ['10','30','50']) {
      const sweepCtx = document.getElementById(`${tc}-sweep-${pct}`);
      if (!sweepCtx) continue;
      const p = d.perf[pct];
      const mrData = p.sweep_mr;
      const bmrData = p.sweep_bmr;
      const lru_mr = mrData.find(([l])=>l==='LRU')?.[2];
      const lru_bmr = bmrData.find(([l])=>l==='LRU')?.[2];
      
      // Only single-threshold sweep (exclude LRU, show threshold values)
      const thresholds = ['1kiB','4kiB','16kiB','64kiB','256kiB','1MiB','4MiB','16MiB','64MiB'];
      const mrByThr = Object.fromEntries(mrData.map(([l,t,v])=>[t,v]));
      const bmrByThr = Object.fromEntries(bmrData.map(([l,t,v])=>[t,v]));
      const sweepLabels = thresholds.filter(t => mrByThr[t] !== undefined);
      
      new Chart(sweepCtx, {
        type: 'line',
        data: {
          labels: sweepLabels,
          datasets: [
            {
              label: 'MR', data: sweepLabels.map(t=>mrByThr[t]),
              borderColor: '#60a5fa', borderWidth: 2, pointRadius: 3, tension: 0.2, fill: false
            },
            {
              label: 'LRU MR', data: sweepLabels.map(()=>lru_mr),
              borderColor: '#60a5fa', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false
            },
            {
              label: 'BMR', data: sweepLabels.map(t=>bmrByThr[t]),
              borderColor: '#fb923c', borderWidth: 2, pointRadius: 3, tension: 0.2, fill: false
            },
            {
              label: 'LRU BMR', data: sweepLabels.map(()=>lru_bmr),
              borderColor: '#fb923c', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false
            },
          ]
        },
        options: {
          ...defaults,
          plugins: {
            legend: { display: true, position: 'bottom', labels: { color: '#8892a4', font:{size:9}, boxWidth: 12, padding: 8 } }
          },
          scales: { ...defaults.scales, y: { ...defaults.scales.y, title: { display: true, text: '(%)', color: '#8892a4', font:{size:10} } } }
        }
      });
    }
  }
}

// Build DOM
const tabBar = document.getElementById('tabBar');
const panelsDiv = document.getElementById('panels');

// Overview tab
const ovTab = document.createElement('div');
ovTab.className = 'tab active';
ovTab.textContent = '全体サマリー';
ovTab.dataset.panel = 'overview';
tabBar.appendChild(ovTab);
panelsDiv.appendChild(buildOverview());

// Per-trace tabs
for (const tc of TRACES) {
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.textContent = TRACE_LABELS[tc];
  tab.dataset.panel = tc;
  tabBar.appendChild(tab);
  panelsDiv.appendChild(buildTracePanel(tc));
}

// Tab switching
tabBar.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  const panel = document.getElementById(`panel-${tab.dataset.panel}`);
  if (panel) panel.classList.add('active');
});

// Init charts after DOM
requestAnimationFrame(() => setTimeout(initCharts, 50));
</script>
</body>
</html>
